name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Match tag to package version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          lock_version=$(node -p "require('./package-lock.json').packages[''].version")
          if [[ "$lock_version" != "$version" ]]; then
            echo "package-lock version $lock_version does not match package version $version" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi

      - name: Verify source
        run: npm run check

      - name: Build and inspect release asset
        shell: bash
        run: |
          archive=$(npm pack --silent)
          mv -- "$archive" qiyan-bot.tgz
          tar -tzf qiyan-bot.tgz | sort > package-files.txt
          cat > expected-package-files.txt <<'EOF'
          package/README.md
          package/assets/assistant/AGENTS.md
          package/assets/assistant/session-status.example.json
          package/assets/brand/qiyan-logo.png
          package/assets/brand/qiyan-overview.svg
          package/assets/endpoints.example.jsonc
          package/assets/remote/qiyan-app-server-launcher.sh
          package/assets/remote/qiyan-ssh-helper.mjs
          package/assets/slack/manifest.yaml
          package/dist/qiyan-bot
          package/docs/chat-apps/wechat.md
          package/docs/sqlite.md
          package/docs/ssh-workers.md
          package/package.json
          EOF
          diff -u expected-package-files.txt package-files.txt

          mkdir extracted
          tar -xzf qiyan-bot.tgz -C extracted
          retired_role="coor""dinator"
          retired_product="codex""-bot"
          retired_package="codex""-chat-bot"
          retired_compact="codex""bot"
          retired_spaced="Codex"" bot"
          if grep -RIFni -- "$retired_role" extracted/package \
            || grep -RIFn -- "$retired_product" extracted/package \
            || grep -RIFn -- "$retired_package" extracted/package \
            || grep -RIFn -- "$retired_compact" extracted/package \
            || grep -RIFn -- "$retired_spaced" extracted/package
          then
            echo "release package contains a retired product identifier" >&2
            exit 1
          fi

          (
            cd extracted/package
            env -i HOME="$HOME" PATH="$PATH" ./dist/qiyan-bot --version
            smoke_home=$(mktemp -d)
            chmod 700 "$smoke_home"
            cat > "$smoke_home/.env" <<'EOF'
          TELEGRAM_BOT_TOKEN=release-smoke-placeholder
          TELEGRAM_OWNER_ID=1
          TELEGRAM_DESTINATION_CHAT_ID=1
          EOF
            chmod 600 "$smoke_home/.env"
            env -i HOME="$HOME" PATH="$PATH" ./dist/qiyan-bot config-check --home "$smoke_home"
            rm -rf -- "$smoke_home"
          )

      - name: Create release and upload package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" qiyan-bot.tgz --clobber
          asset_digest=""
          for attempt in {1..10}; do
            asset_digest=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
              --jq '.assets[] | select(.name == "qiyan-bot.tgz") | .digest' || true)
            [[ "$asset_digest" == sha256:* ]] && break
            sleep 2
          done
          if [[ -z "$asset_digest" || "$asset_digest" != sha256:* ]]; then
            echo "GitHub did not publish a sha256: digest for qiyan-bot.tgz" >&2
            exit 1
          fi
          printf 'Published qiyan-bot.tgz with digest %s\n' "$asset_digest"
