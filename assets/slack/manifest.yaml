display_information:
  name: QiYan
  description: Single-user personal assistant powered by Codex
  background_color: "#2f3136"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: QiYan
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:write
      - users:read
    user:
      - search:read.files
      - search:read.im
      - search:read.mpim
      - search:read.private
      - search:read.public
      - search:read.users
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
